<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEARL EARRING - Gallery Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        /* ================= 古典/艺术馆剧场风视觉变量 ================= */
        :root {
            /* 深邃的美术馆炭黑与幽暗背景 */
            --bg-charcoal: #141414;
            --bg-panel: #1e1e1e;
            
            /* 珍珠耳环的标志性色彩 */
            --amber-gold: #D4AF37;
            --amber-light: #F3E5AB;
            --ultramarine: #120A8F;
            
            /* 柔和的文本色彩 */
            --text-main: #EAE6DF;
            --text-sub: #88847D;
            
            --radius-md: 8px;
            --shadow-depth: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            
            /* 字体设置：UI 用无衬线，歌词和标题用典雅的衬线体 */
            --font-ui: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            --font-serif: "Playfair Display", "Georgia", "Times New Roman", serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-charcoal);
            font-family: var(--font-ui);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; padding: 20px;
            overflow-x: hidden;
        }

        /* 古典画布纹理遮罩层 (Canvas Grain) */
        body::before {
            content: ""; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 1000; mix-blend-mode: overlay;
        }

        /* 沉浸式剧场容器 */
        .player-container {
            width: 100%; max-width: 420px; 
            background: linear-gradient(145deg, #222, #111);
            padding: 30px 24px; 
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-depth), inset 0 1px 1px rgba(255,255,255,0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative; z-index: 1;
        }

        /* ================= 巴洛克光影与封面区域 ================= */
        .visual-area {
            position: relative; width: 100%; aspect-ratio: 1 / 1;
            margin-bottom: 28px; border-radius: 4px;
            background: #000; perspective: 1000px;
        }

        /* 呼吸环境灯光 (Ambient Glow) */
        .ambient-glow {
            position: absolute; inset: -15px; z-index: -1;
            background: radial-gradient(circle at 20% 80%, rgba(18, 10, 143, 0.4), transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(212, 175, 55, 0.3), transparent 50%);
            filter: blur(20px); opacity: 0; transition: opacity 1s ease;
        }
        .is-playing .ambient-glow { opacity: 1; animation: breatheGlow 6s infinite alternate ease-in-out; }
        @keyframes breatheGlow { 0% { transform: scale(0.95); opacity: 0.6; } 100% { transform: scale(1.05); opacity: 1; } }

        .album-cover {
            width: 100%; height: 100%; object-fit: cover; border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.8s, opacity 0.8s;
            transform-origin: center;
        }

        /* 戏剧化淡入：打开歌词时，封面退后、变暗并景深模糊 */
        .show-lyrics .album-cover {
            transform: translateZ(-80px) translateY(-10px) scale(0.9);
            filter: blur(6px) brightness(0.2);
        }

        /* ================= 金色丝绒律动表 (Web Audio API) ================= */
        .golden-wave {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 35%;
            display: flex; align-items: flex-end; justify-content: center; gap: 2px;
            padding: 0 15% 15px; z-index: 2; opacity: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            transition: opacity 0.6s, transform 0.6s; border-radius: 0 0 4px 4px;
        }
        .is-playing .golden-wave { opacity: 1; }
        .show-lyrics .golden-wave { opacity: 0; transform: translateY(10px); }
        
        .golden-wave span {
            flex: 1; width: 2px; background: linear-gradient(to top, var(--amber-gold), var(--amber-light));
            border-radius: 2px; transition: height 0.05s ease; box-shadow: 0 0 6px rgba(212, 175, 55, 0.3);
            opacity: 0.8; height: 2px; /* 初始底线高度 */
        }

        /* ================= 艺术馆暗调歌词面板 ================= */
        .lyrics-panel {
            position: absolute; inset: 0; z-index: 3;
            background: transparent; overflow-y: auto; 
            padding: 40px 16px 100px; text-align: center;
            opacity: 0; pointer-events: none; transition: opacity 0.6s;
            display: flex; flex-direction: column; scroll-behavior: smooth;
            -ms-overflow-style: none; scrollbar-width: none;
        }
        .lyrics-panel::-webkit-scrollbar { display: none; }
        .show-lyrics .lyrics-panel { opacity: 1; pointer-events: auto; }

        .lyric-line {
            font-family: var(--font-serif);
            font-size: 1rem; color: rgba(234, 230, 223, 0.3); margin-bottom: 20px;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); line-height: 1.6; cursor: pointer;
        }
        .lyric-line.active {
            color: var(--amber-gold); font-size: 1.25rem; 
            text-shadow: 0 0 12px rgba(212, 175, 55, 0.4);
            transform: scale(1.05); letter-spacing: 0.5px;
        }
        .lyrics-status { color: var(--amber-gold); font-family: var(--font-serif); font-size: 0.9rem; margin: auto; letter-spacing: 1px;}

        /* ================= 歌曲信息 ================= */
        .song-details { text-align: center; margin-bottom: 28px; }
        .song-title { 
            font-family: var(--font-serif); font-size: 1.5rem; font-weight: normal; 
            margin-bottom: 6px; letter-spacing: 1px; color: var(--text-main);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .artist-name { font-size: 0.85rem; color: var(--text-sub); letter-spacing: 0.5px; text-transform: uppercase;}

        /* ================= 珍珠质感进度条 ================= */
        .progress-container { margin-bottom: 24px; padding: 0 10px;}
        .progress-slider { -webkit-appearance: none; width: 100%; height: 20px; background: transparent; outline: none; cursor: pointer;}
        
        .progress-slider::-webkit-slider-runnable-track {
            width: 100%; height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px;
            background-image: linear-gradient(var(--amber-gold), var(--amber-gold));
            background-size: var(--progress, 0%) 100%; background-repeat: no-repeat;
        }

        /* 物理高光珍珠滑块 */
        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ffffff 0%, #e8e2d2 30%, #a39b8a 80%);
            box-shadow: 0 2px 6px rgba(0,0,0,0.8), inset -1px -2px 3px rgba(0,0,0,0.4);
            margin-top: -6px; transition: transform 0.2s, box-shadow 0.2s;
        }
        .progress-slider::-webkit-slider-thumb:active { transform: scale(1.3); box-shadow: 0 0 10px var(--amber-light); }

        .time-info { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-sub); margin-top: 8px; font-variant-numeric: tabular-nums;}

        /* ================= 古典极简控制按键 ================= */
        .controls-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .side-controls { display: flex; gap: 15px; align-items: center; width: 60px; }
        .side-controls.right { justify-content: flex-end; position: relative; }
        .main-controls { display: flex; align-items: center; gap: 20px; }

        .btn { background: none; border: none; cursor: pointer; color: var(--text-sub); fill: currentColor; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .btn svg { width: 100%; height: 100%; }
        .btn:hover, .btn.active { color: var(--amber-gold); }
        
        .btn-side { width: 22px; height: 22px; }
        .btn-prev, .btn-next { width: 28px; height: 28px; }
        
        /* 播放主键 */
        .btn-play {
            width: 50px; height: 50px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main); background: linear-gradient(145deg, #2a2a2a, #111);
            box-shadow: 5px 5px 15px #0a0a0a, -5px -5px 15px #2b2b2b;
        }
        .btn-play:active { box-shadow: inset 5px 5px 10px #0a0a0a, inset -5px -5px 10px #2b2b2b; color: var(--amber-gold);}
        .is-playing .btn-play { border-color: rgba(212, 175, 55, 0.3); color: var(--amber-gold); }

        /* ================= 悬浮流媒体与 Spotify 全局收藏 ================= */
        .platform-popup {
            position: absolute; bottom: 40px; right: -5px;
            background: rgba(25, 25, 25, 0.95); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-md);
            box-shadow: 0 15px 30px rgba(0,0,0,0.9);
            display: none; flex-direction: column; padding: 6px; z-index: 100; min-width: 140px;
        }
        .platform-popup.show { display: flex; animation: fadeUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .platform-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 12px; text-decoration: none;
            color: var(--text-main); font-size: 0.8rem; border-radius: 4px; transition: background 0.2s;
        }
        .platform-item:active { background: rgba(255,255,255,0.05); }
        .platform-item svg, .platform-item img { width: 18px; height: 18px; fill: currentColor; }

        /* 顶部一键收藏完整歌单 */
        .platform-item.global-playlist {
            color: #1DB954; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 4px; padding-bottom: 12px; border-radius: 4px 4px 0 0;
        }

        /* ================= 黑漆描金歌单列表 ================= */
        .playlist-header {
            font-size: 0.75rem; color: var(--text-sub); letter-spacing: 2px; margin-bottom: 16px;
            display: flex; justify-content: space-between; text-transform: uppercase; padding: 0 4px;
        }
        .track-list { list-style: none; max-height: 200px; overflow-y: auto; padding-right: 4px; -ms-overflow-style: none; scrollbar-width: none; overscroll-behavior: contain;}
        .track-list::-webkit-scrollbar { display: none; }
        
        .track-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 12px; cursor: pointer; margin-bottom: 4px; border-radius: 6px;
            background: transparent; transition: all 0.3s ease;
            border-left: 2px solid transparent;
        }
        
        /* 漆器描金高亮效果 */
        .track-item.active { 
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.05), transparent);
            border-left: 2px solid var(--amber-gold);
        }
        .track-name { font-family: var(--font-serif); font-size: 0.95rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 15px;}
        .track-time { font-size: 0.75rem; color: var(--text-sub); flex-shrink: 0; font-variant-numeric: tabular-nums;}
        .track-item.active .track-name { color: var(--amber-gold); }

        .toast {
            position: fixed; top: -30px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.95); border: 1px solid var(--amber-gold);
            color: var(--amber-gold); padding: 10px 24px; font-family: var(--font-serif); font-size: 0.85rem; letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8); border-radius: 30px;
            opacity: 0; pointer-events: none; transition: opacity 0.4s, top 0.4s; z-index: 1000;
        }
        .toast.show { opacity: 1; top: 30px; }
    </style>
</head>
<body>

<div class="player-container" id="playerApp">
    <div class="toast" id="toastBox">PROMPT MSG</div>

    <div class="visual-area">
        <div class="ambient-glow"></div>
        <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><rect width='400' height='400' fill='%23141414'/></svg>" alt="Album Cover" class="album-cover" id="albumCover">
        
        <div class="golden-wave" id="goldenWave"></div>

        <div class="lyrics-panel" id="lyricsPanel">
            <div class="lyrics-status" id="lyricsStatus">Curtain Open...</div>
            <div id="lyricsContent"></div>
        </div>
    </div>

    <div class="song-details">
        <div class="song-title" id="currentTitle">Loading...</div>
        <div class="artist-name" id="currentArtist">...</div>
    </div>

    <div class="progress-container">
        <input type="range" class="progress-slider" id="progressSlider" min="0" max="100" value="0">
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>
    </div>

    <div class="controls-bar">
        <div class="side-controls">
            <button class="btn btn-side" id="btnLoop" title="循环模式">
                <svg viewBox="0 0 24 24" id="loopIcon"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
            <button class="btn btn-side" id="btnLyrics" title="查看台词">
                <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            </button>
        </div>

        <div class="main-controls">
            <button class="btn btn-prev" id="btnPrev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button class="btn btn-play" id="btnPlay"><svg viewBox="0 0 24 24" id="playIcon" style="width:24px;height:24px;"><path d="M8 5v14l11-7z"/></svg></button>
            <button class="btn btn-next" id="btnNext"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/></svg></button>
        </div>

        <div class="side-controls right">
            <button class="btn btn-side" id="btnPlatform" title="流媒体跳转">
                <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
            </button>
            <div class="platform-popup" id="platformPopup">
                <a href="https://open.spotify.com/playlist/5SrPVownMBEBoAHkbSJaXA?si=e4NW9NiXTOWxztRnCvY1VA" class="platform-item global-playlist" target="_blank">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.565.387-.86.207-2.377-1.454-5.37-1.783-8.893-.982-.336.075-.668-.135-.744-.47-.077-.336.135-.668.47-.743 3.856-.88 7.15-.51 9.822 1.13.296.18.387.563.206.858zm1.225-2.72c-.227.367-.707.487-1.074.26-2.72-1.672-6.87-2.157-10.082-1.182-.413.125-.847-.107-.972-.52-.125-.413.107-.847.52-.972 3.676-1.114 8.243-.573 11.35 1.335.366.226.486.706.258 1.074zm.105-2.834C14.383 8.8 8.417 8.604 4.973 9.65c-.53.16-1.09-.142-1.25-.673-.16-.53.14-1.09.672-1.25 3.963-1.202 10.556-.977 14.64 1.447.476.283.63.9.347 1.377-.283.477-.9.63-1.377.347z"/></svg>
                    <span>收藏完整歌单</span>
                </a>
                <a href="#" class="platform-item" id="linkApple" target="_blank"><span>Apple Music</span></a>
                <a href="#" class="platform-item" id="linkQQ" target="_blank"><span>QQ 音乐</span></a>
                <a href="#" class="platform-item" id="linkNetease" target="_blank"><span>网易云音乐</span></a>
                <a href="#" class="platform-item" id="linkSpotify" target="_blank"><span>Spotify 单曲</span></a>
                <a href="#" class="platform-item" id="linkBilibili" target="_blank"><span>Bilibili</span></a>
            </div>
        </div>
    </div>

    <div class="playlist-header"><span>播放列表</span></div>
    <ul class="track-list" id="trackList"></ul>
</div>

<div style="display:none">
    <audio id="mainAudio" src="" preload="metadata"></audio>
    <audio id="shadowAudio" src="" preload="metadata" crossorigin="anonymous"></audio>
</div>

<script>
    // [安全] XSS 过滤器 - 采用绝对稳定的 Unicode 编码层，彻底规避复制导致的单引号崩溃
    function escapeHTML(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, function(match) {
            return { 
                '&': '\u0026\u0061\u006d\u0070\u003b', 
                '<': '\u0026\u006c\u0074\u003b',     
                '>': '\u0026\u0067\u0074\u003b',     
                '"': '\u0026\u0071\u0075\u006f\u0074\u003b', 
                "'": '\u0026\u0023\u0030\u0033\u0039\u003b'  
            }[match];
        });
    }

    function isSafeUrl(url) {
        const invalidProtocols = /^(javascript|vbscript|data):/i;
        return !invalidProtocols.test(url.trim());
    }

    const fetchWithTimeout = async (resource, options = {}) => {
        const { timeout = 5000 } = options;
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        try {
            const response = await fetch(resource, { ...options, signal: controller.signal });
            clearTimeout(id);
            return response;
        } catch (error) {
            clearTimeout(id);
            throw error;
        }
    };

    let playlist = []; 
    let currentTrackIndex = 0;
    let isPlaying = false;
    let loopMode = 0; 
    let isDragging = false; 
    let parsedLyrics = [];
    
    let isUserScrolling = false;
    let userScrollTimeout;
    let currentLyricsRequestId = 0;
    let lastActiveLyricIndex = -1; 
    let activePlatformsCount = 0;
    let currentCoverObjectURL = null;

    // Web Audio API 双轨分流控制变量
    let audioCtx = null;
    let analyser = null;
    let dataArray = null;

    // 获取双重发声音轨
    const audio = document.getElementById('mainAudio');
    const shadowAudio = document.getElementById('shadowAudio');

    const playerApp = document.getElementById('playerApp');
    const btnLyrics = document.getElementById('btnLyrics');
    const lyricsStatus = document.getElementById('lyricsStatus');
    const lyricsContent = document.getElementById('lyricsContent');
    const lyricsPanel = document.getElementById('lyricsPanel');
    const progressSlider = document.getElementById('progressSlider');
    const currentTimeText = document.getElementById('currentTime');
    const totalTimeText = document.getElementById('totalTime');
    const trackListContainer = document.getElementById('trackList');

    // 动态在 HTML 结构中挂载 32 根金色丝绒谱线容器
    const waveContainer = document.getElementById('goldenWave');
    for(let i=0; i<32; i++){ waveContainer.appendChild(document.createElement('span')); }

    const loopIconsSVG = [
        '<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>',
        '<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/><text x="12" y="15.5" font-size="7" font-weight="bold" text-anchor="middle" fill="currentColor">1</text>',
        '<path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>'
    ];

    async function loadPlaylistConfig() {
        try {
            const response = await fetchWithTimeout('playlist.json', { timeout: 6000 });
            if (!response.ok) throw new Error('Network error');
            playlist = await response.json();
            if (!playlist || playlist.length === 0) {
                lyricsStatus.textContent = 'EXHIBITION EMPTY';
                return;
            }
            initPlaylist();
            loadTrack(0);
        } catch (error) {
            showToast("Failed to load playlist.json");
            lyricsStatus.textContent = 'CATALOGUE LOAD ERROR';
        }
    }

    const handleUserScroll = () => {
        isUserScrolling = true;
        clearTimeout(userScrollTimeout);
        userScrollTimeout = setTimeout(() => isUserScrolling = false, 3000);
    };
    lyricsPanel.addEventListener('touchstart', handleUserScroll, {passive: true});
    lyricsPanel.addEventListener('wheel', handleUserScroll, {passive: true});
    lyricsPanel.addEventListener('mousedown', handleUserScroll);

    function initPlaylist() {
        trackListContainer.innerHTML = '';
        playlist.forEach((track, index) => {
            const li = document.createElement('li');
            li.className = `track-item ${index === currentTrackIndex ? 'active' : ''}`;
            const displayDuration = track.duration || "--:--";
            
            li.innerHTML = `
                <span class="track-name">${index + 1}. ${escapeHTML(track.title)}</span>
                <span class="track-time" id="list-time-${index}">${escapeHTML(displayDuration)}</span>
            `;
            li.addEventListener('click', () => switchTrack(index));
            trackListContainer.appendChild(li);
        });
    }

    // 将解析出的高清图像和曲目元数据强势输送给移动操作系统的媒体控制中心
    function updateSystemMediaSession(track, coverUrl) {
        if ('mediaSession' in navigator) {
            let artworkArray = [];
            if (coverUrl) {
                artworkArray.push({ src: coverUrl, sizes: '512x512', type: 'image/jpeg' });
            }
            navigator.mediaSession.metadata = new MediaMetadata({
                title: track.title,
                artist: track.artist || 'Unknown Artist',
                album: 'Pearl Earring',
                artwork: artworkArray
            });
        }
    }

    function loadTrack(index) {
        isUserScrolling = false;
        clearTimeout(userScrollTimeout);
        lastActiveLyricIndex = -1; 

        currentTrackIndex = index;
        const track = playlist[index];
        
        // 🌟 双线轨同时填装相同音频源
        audio.src = track.src;
        shadowAudio.src = track.src;

        document.getElementById('currentTitle').textContent = track.title;
        document.getElementById('currentArtist').textContent = track.artist;
        document.title = `${track.title} - ${track.artist}`;

        const albumCover = document.getElementById('albumCover');
        if (currentCoverObjectURL) {
            URL.revokeObjectURL(currentCoverObjectURL);
            currentCoverObjectURL = null;
        }
        albumCover.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><rect width='400' height='400' fill='%23141414'/></svg>";

        // 默认先初始化一次手机系统的控制台
        updateSystemMediaSession(track, null);

        if (window.jsmediatags && track.src) {
            jsmediatags.read(track.src, {
                onSuccess: function(tag) {
                    if (tag.tags && tag.tags.picture) {
                        const image = tag.tags.picture;
                        const byteArray = new Uint8Array(image.data);
                        const blob = new Blob([byteArray], { type: image.format });
                        currentCoverObjectURL = URL.createObjectURL(blob);
                        albumCover.src = currentCoverObjectURL;
                        
                        // 🌟 本地油画图片解析完毕，火速推送更新至手机锁屏封面大图！
                        updateSystemMediaSession(track, currentCoverObjectURL);
                    }
                },
                onError: function(error) {
                    console.log('No embed artwork found.');
                }
            });
        }
        
        let tempMax = 300;
        if (track.duration && track.duration.includes(':')) {
            const timeParts = track.duration.split(':');
            tempMax = parseInt(timeParts[0]) * 60 + parseInt(timeParts[1]);
        }
        progressSlider.max = tempMax; 
        
        totalTimeText.textContent = track.duration || "--:--"; 
        progressSlider.value = 0;
        progressSlider.style.setProperty('--progress', '0%');
        currentTimeText.textContent = '0:00';

        activePlatformsCount = 0;
        setupPlatform('linkApple', track.apple);
        setupPlatform('linkQQ', track.qq);
        setupPlatform('linkNetease', track.netease);
        setupPlatform('linkSpotify', track.spotify);
        setupPlatform('linkBilibili', track.bilibili);

        const btnPlat = document.getElementById('btnPlatform');
        const popPlat = document.getElementById('platformPopup');
        btnPlat.style.display = 'flex'; 
        btnPlat.classList.remove('active');
        popPlat.classList.remove('show');

        const items = trackListContainer.querySelectorAll('.track-item');
        items.forEach((item, idx) => item.classList.toggle('active', idx === index));

        fetchLyrics(track);
    }

    function setupPlatform(id, url) {
        const el = document.getElementById(id);
        if (url && url.trim() !== "" && isSafeUrl(url)) { 
            el.href = url; 
            el.style.display = 'flex';
            activePlatformsCount++;
        } else { 
            el.href = "#"; 
            el.style.display = 'none';
        }
    }

    function switchTrack(index) {
        if (playlist.length === 0) return;
        if (index < 0) index = playlist.length - 1;
        if (index >= playlist.length) index = 0;
        loadTrack(index);
        audio.play().catch(() => {});
    }

    async function fetchLyrics(track) {
        lyricsStatus.style.display = 'block';
        lyricsStatus.textContent = 'Searching Scripts...';
        lyricsContent.innerHTML = '';
        parsedLyrics = [];
        const requestId = ++currentLyricsRequestId;

        try {
            const targetUrl = `https://lrclib.net/api/get?track_name=${encodeURIComponent(track.title)}&artist_name=${encodeURIComponent(track.artist)}`;
            let response;
            
            try {
                response = await fetchWithTimeout(targetUrl, { timeout: 4000 });
                if (!response.ok) throw new Error('Direct fetch failed');
            } catch (directError) {
                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
                response = await fetchWithTimeout(proxyUrl, { timeout: 5000 });
                if (!response.ok) throw new Error('Proxy fetch failed');
            }
            
            if (requestId !== currentLyricsRequestId) return; 
            const data = await response.json();
            
            if (data.syncedLyrics) {
                lyricsStatus.style.display = 'none';
                parsedLyrics = parseLRC(data.syncedLyrics);
                renderLyrics();
            } else if (data.plainLyrics) {
                lyricsStatus.style.display = 'none';
                const safePlainLyrics = escapeHTML(data.plainLyrics).replace(/\n/g, '<br><br>');
                lyricsContent.innerHTML = `
                    <div style="font-size:0.85rem; color:var(--text-sub); margin-bottom:24px; font-weight:bold; letter-spacing:1px;">[ LIBRETTO ONLY ]</div>
                    <div class="lyric-line" style="color:var(--amber-light); cursor:default; pointer-events:none;">${safePlainLyrics}</div>
                `;
            } else {
                lyricsStatus.textContent = '[ INSTRUMENTAL ]';
            }
        } catch (error) {
            if (requestId === currentLyricsRequestId) {
                lyricsStatus.textContent = '[ SCRIPTS UNAVAILABLE ]';
            }
        }
    }

    function parseLRC(lrc) {
        const lines = [];
        const regex = /\[(\d{2}):(\d{2}(?:\.\d{2,3})?)\](.*)/g;
        let match;
        while ((match = regex.exec(lrc)) !== null) {
            const minutes = parseInt(match[1]);
            const seconds = parseFloat(match[2]);
            const text = match[3].trim();
            if (text) lines.push({ time: minutes * 60 + seconds, text: text });
        }
        return lines;
    }

    function renderLyrics() {
        lyricsContent.innerHTML = '';
        parsedLyrics.forEach((line, index) => {
            const p = document.createElement('div');
            p.className = 'lyric-line';
            p.id = `lyric-${index}`;
            p.textContent = line.text;
            p.addEventListener('click', () => {
                audio.currentTime = line.time;
                if (!isPlaying) audio.play();
                isUserScrolling = false; 
            });
            lyricsContent.appendChild(p);
        });

        if (playerApp.classList.contains('show-lyrics')) {
            syncLyrics(audio.currentTime);
        }
    }

    function syncLyrics(currentTime) {
        if (parsedLyrics.length === 0) return;

        let activeIndex = 0;
        for (let i = 0; i < parsedLyrics.length; i++) {
            if (currentTime >= parsedLyrics[i].time) activeIndex = i;
            else break;
        }

        if (activeIndex !== lastActiveLyricIndex) {
            const lines = lyricsContent.getElementsByClassName('lyric-line');
            for (let i = 0; i < lines.length; i++) {
                if (i === activeIndex) {
                    if (!lines[i].classList.contains('active')) {
                        lines[i].classList.add('active');
                        if (!isUserScrolling) {
                            const targetTop = lines[i].offsetTop - (lyricsPanel.clientHeight / 2) + (lines[i].clientHeight / 2);
                            lyricsPanel.scrollTo({ top: targetTop, behavior: 'smooth' });
                        }
                    }
                } else {
                    lines[i].classList.remove('active');
                }
            }
            lastActiveLyricIndex = activeIndex;
        }
    }

    btnLyrics.addEventListener('click', () => {
        playerApp.classList.toggle('show-lyrics');
        btnLyrics.classList.toggle('active');
        if (playerApp.classList.contains('show-lyrics')) {
            setTimeout(() => {
                const activeLine = lyricsContent.querySelector('.lyric-line.active');
                if (activeLine) {
                    const targetTop = activeLine.offsetTop - (lyricsPanel.clientHeight / 2) + (activeLine.clientHeight / 2);
                    lyricsPanel.scrollTo({ top: targetTop, behavior: 'auto' });
                }
            }, 100); 
        }
    });

    audio.addEventListener('loadedmetadata', () => {
        progressSlider.max = audio.duration; 
        totalTimeText.textContent = formatTime(audio.duration);
    });

    // 🌟 核心双核校准：当拖动进度条跳转时，影子音频精确尾随对齐主音频
    audio.addEventListener('seeked', () => {
        shadowAudio.currentTime = audio.currentTime;
    });

    audio.addEventListener('timeupdate', () => {
        if (audio.duration && !isDragging) {
            progressSlider.value = audio.currentTime;
            currentTimeText.textContent = formatTime(audio.currentTime);
            const percent = (audio.currentTime / audio.duration) * 100;
            progressSlider.style.setProperty('--progress', `${percent}%`);
            syncLyrics(audio.currentTime);
        }
    });

    audio.addEventListener('waiting', () => { currentTimeText.textContent = "BUFF..."; });
    audio.addEventListener('playing', () => { currentTimeText.textContent = formatTime(audio.currentTime); });

    progressSlider.addEventListener('input', () => {
        isDragging = true;
        currentTimeText.textContent = formatTime(progressSlider.value);
        const percent = (progressSlider.value / audio.duration) * 100;
        progressSlider.style.setProperty('--progress', `${percent}%`);
        syncLyrics(parseFloat(progressSlider.value));
    });
    
    progressSlider.addEventListener('change', () => {
        audio.currentTime = progressSlider.value;
        isDragging = false;
    });

    document.getElementById('btnPlay').addEventListener('click', () => {
        if (playlist.length === 0) return;
        if (isPlaying) audio.pause(); else audio.play().catch(() => showToast("MANUAL PLAY REQ"));
    });

    document.getElementById('btnPrev').addEventListener('click', () => switchTrack(currentTrackIndex - 1));
    document.getElementById('btnNext').addEventListener('click', () => switchTrack(currentTrackIndex + 1));

    document.getElementById('btnLoop').addEventListener('click', () => {
        loopMode = (loopMode + 1) % 3;
        document.getElementById('loopIcon').innerHTML = loopIconsSVG[loopMode];
        showToast(["LOOP: ALL", "LOOP: ONE", "SHUFFLE"][loopMode]);
    });

    document.getElementById('btnPlatform').addEventListener('click', (e) => {
        e.stopPropagation(); 
        const popup = document.getElementById('platformPopup');
        const btn = document.getElementById('btnPlatform');
        const isShow = popup.classList.toggle('show');
        btn.classList.toggle('active', isShow);
    });

    document.addEventListener('click', (e) => {
        const popup = document.getElementById('platformPopup');
        const btn = document.getElementById('btnPlatform');
        if (!popup.contains(e.target) && !btn.contains(e.target)) {
            popup.classList.remove('show');
            btn.classList.remove('active');
        }
    });

    audio.addEventListener('ended', () => {
        if (loopMode === 1) { 
            audio.currentTime = 0; 
            audio.play(); 
        } else if (loopMode === 2) {
            let nextIdx;
            do { nextIdx = Math.floor(Math.random() * playlist.length); } while (nextIdx === currentTrackIndex && playlist.length > 1);
            switchTrack(nextIdx);
        } else {
            switchTrack(currentTrackIndex + 1);
        }
    });

    audio.addEventListener('play', () => {
        isPlaying = true;
        playerApp.classList.add('is-playing'); 
        document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        
        // 🌟 主音轨播放时，让无声的影子音轨也在后台同步随行
        shadowAudio.play().catch(()=>{});
        
        initRealTimeEQ(); // 唤醒金色丝绒律动表
    });

    // ====== 【重构：无缝衔接影子音频节点的金色丝绒采样器】 ======
    function initRealTimeEQ() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128; // 采样 64 个频段以供 32 根金线选择
            
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            
            // 🌟 关键破局点：分析源绑定到影子音轨，绝不染指、劫持主音频，保障后台持续运行不被系统冻结！
            const source = audioCtx.createMediaElementSource(shadowAudio);
            
            // 挂载硬件音量调节点
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 0; // 强行拉至 0 分贝（静音阻断），防范双重重音污染
            
            // 拓扑电路连线：影子音轨 -> 分析矩阵 -> 静音器 -> 系统音频输出
            source.connect(analyser);
            analyser.connect(gainNode);
            gainNode.connect(audioCtx.destination); 
            
            renderAudioPulse();
        }
        
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function renderAudioPulse() {
        if (analyser && isPlaying) {
            analyser.getByteFrequencyData(dataArray);
            
            // 抓取 32 根极细金线
            const bars = document.querySelectorAll('.golden-wave span');
            
            bars.forEach((bar, i) => {
                // 读取中低音频段数据
                const rawValue = dataArray[i + 2] || 0; 
                // 丝滑几何映射：将频率强度映射为金线跳动高度
                const targetHeight = 2 + (rawValue / 255) * 50; 
                bar.style.height = `${targetHeight}px`;
            });
            requestAnimationFrame(renderAudioPulse);
        }
    }

    audio.addEventListener('pause', () => {
        isPlaying = false;
        playerApp.classList.remove('is-playing');
        document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
        
        // 主轨止，影子轨亦同步急刹
        shadowAudio.pause();
    });

    audio.addEventListener('error', () => {
        if (!isPlaying) return;
        if (audio.error && audio.error.code === 1) return;
        showToast("AUDIO LOAD ERROR");
        isPlaying = false;
        playerApp.classList.remove('is-playing');
        document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
    });

    function formatTime(seconds) {
        if (isNaN(seconds) || seconds === Infinity) return "0:00";
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    let toastTimer;
    function showToast(msg) {
        const tb = document.getElementById('toastBox');
        tb.textContent = msg; tb.classList.add('show');
        clearTimeout(toastTimer); toastTimer = setTimeout(() => tb.classList.remove('show'), 2500);
    }

    // ====== 🌟 完美绑定手机系统锁屏控制中心的切歌与播放机制 ======
    if ('mediaSession' in navigator) {
        navigator.mediaSession.setActionHandler('play', () => audio.play());
        navigator.mediaSession.setActionHandler('pause', () => audio.pause());
        navigator.mediaSession.setActionHandler('previoustrack', () => switchTrack(currentTrackIndex - 1));
        navigator.mediaSession.setActionHandler('nexttrack', () => switchTrack(currentTrackIndex + 1));
    }

    loadPlaylistConfig();
</script>
